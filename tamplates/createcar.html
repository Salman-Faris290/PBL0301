{% extends "base.html" %}

{% block title %}Tambah Mobil - Car Management{% endblock %}

{% block content %}
<div class="card p-4">
    <div class="card-header mb-4">
        <h2 class="mb-0"><i class="fas fa-plus-circle"></i> Tambah Mobil Baru</h2>
    </div>

    <form method="POST" novalidate>
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="brand" class="form-label"><strong>Brand</strong></label>
                <input type="text" class="form-control" id="brand" name="brand" 
                       placeholder="contoh: Toyota, Honda, Nissan" required>
                <small class="text-muted">Merek mobil</small>
            </div>
            <div class="col-md-6">
                <label for="model" class="form-label"><strong>Model</strong></label>
                <input type="text" class="form-control" id="model" name="model" 
                       placeholder="contoh: Avanza, Civic, X-Trail" required>
                <small class="text-muted">Model mobil</small>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label for="year" class="form-label"><strong>Tahun Produksi</strong></label>
                <input type="number" class="form-control" id="year" name="year" 
                       placeholder="contoh: 2023" min="1900" max="2099" required>
                <small class="text-muted">Tahun produksi</small>
            </div>
            <div class="col-md-4">
                <label for="color" class="form-label"><strong>Warna</strong></label>
                <select class="form-select" id="color" name="color" required>
                    <option value="">-- Pilih Warna --</option>
                    <option value="Merah">Merah</option>
                    <option value="Biru">Biru</option>
                    <option value="Hitam">Hitam</option>
                    <option value="Putih">Putih</option>
                    <option value="Perak">Perak</option>
                    <option value="Abu-abu">Abu-abu</option>
                    <option value="Hijau">Hijau</option>
                    <option value="Kuning">Kuning</option>
                    <option value="Orange">Orange</option>
                    <option value="Coklat">Coklat</option>
                </select>
                <small class="text-muted">Warna mobil</small>
            </div>
            <div class="col-md-4">
                <label for="price" class="form-label"><strong>Harga (Rp)</strong></label>
                <input type="number" class="form-control" id="price" name="price" 
                       placeholder="contoh: 150000000" step="0.01" min="0" required>
                <small class="text-muted">Harga dalam Rupiah</small>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Simpan Mobil
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Batal
            </a>
        </div>
    </form>
</div>
{% endblock %}
